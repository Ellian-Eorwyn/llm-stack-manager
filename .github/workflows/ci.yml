name: CI
on:
  push:
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: bash bootstrap-ubuntu.sh --dry-run
      - run: bash test.sh
